# ==================================================================================================
# tmux.conf
# Ported from zellij config. Preserves Alt+* global bindings and zellij-style
# modal keybinds (pane/tab/resize/scroll/session/move) via `switch-client -T`.
# ==================================================================================================

# ===> Prefix ======================================================================================
# Keep Ctrl+b to match zellij's "unlock" key and preserve muscle memory
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# ===> Terminal capabilities =======================================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB,hyperlinks,ccolour,cstyle,focus,title,usstyle,clipboard"
set -as terminal-features ",xterm-256color:RGB,hyperlinks,ccolour,cstyle,focus,title,usstyle,clipboard"

set -g set-clipboard on
set -s extended-keys on
set -s escape-time 10
set -g focus-events on

# Kitty Graphics Protocol / sixel passthrough (main reason for migrating)
set -g allow-passthrough on

# ===> General behaviour ===========================================================================
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g display-time 2000

# ===> Pane border (closest approximation to zellij frames) =======================================
# tmux can't frame each pane individually, so we rely on:
#   - single (thin) line style — heavy glyphs bleed across cells, especially
#     when bold is applied, so we keep lines thin and let colour + the title
#     bar carry the active-pane emphasis.
#   - pane-border-status top: every pane gets a title bar that highlights
#     when active, giving a top+left+right frame-ish look.
# (colours are re-applied after the theme is sourced — see below)
set -g pane-border-lines double
set -g pane-border-indicators colour
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=#15161e#,bg=#7aa2f7#,bold],#[fg=#7aa2f7#,bg=#16161e]} #P  #{pane_current_command} "

# ==================================================================================================
# Keybindings: zellij-style modal layout
# ==================================================================================================

# ===> Root table: always-active Alt bindings (mirror zellij "shared_among normal/locked") =========
# Horizontal: at the window edge, fall through to prev/next window (mirrors
# zellij's MoveFocusOrTab). Vertical stays pane-only (tabs arrange horizontally).
bind -n M-h if-shell -F "#{pane_at_left}"  "previous-window" "select-pane -L"
bind -n M-l if-shell -F "#{pane_at_right}" "next-window"     "select-pane -R"
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-Left  if-shell -F "#{pane_at_left}"  "previous-window" "select-pane -L"
bind -n M-Right if-shell -F "#{pane_at_right}" "next-window"     "select-pane -R"
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U

bind -n M-= resize-pane -R 2 \; resize-pane -D 1
bind -n M-+ resize-pane -R 2 \; resize-pane -D 1
bind -n M-- resize-pane -L 2 \; resize-pane -U 1

bind -n M-f resize-pane -Z
bind -n M-g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
# Smart split: if the pane is wider than tall, split right; otherwise split down.
# Mirrors zellij's NewPane (which picks direction based on aspect ratio).
bind -n M-n if-shell "[ #{pane_width} -gt $((#{pane_height} * 2)) ]" \
    "split-window -h -c '#{pane_current_path}'" \
    "split-window -v -c '#{pane_current_path}'"
# Explicit split-down (overrides readline's Alt+d "delete word forward" in the shell)
bind -n M-d split-window -v -c "#{pane_current_path}"
bind -n M-X kill-pane

bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-i swap-window -t -1 \; select-window -t -1
bind -n M-o swap-window -t +1 \; select-window -t +1

# ===> Prefix table: mode entries ==================================================================
bind p switch-client -T pane-mode
bind t switch-client -T tab-mode
bind r switch-client -T resize-mode
bind s switch-client -T scroll-mode
bind o switch-client -T session-mode
bind m switch-client -T move-mode

# Prefix + r: reload config
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Prefix + ?: show cheatsheet popup
bind ? display-popup -E -w 80% -h 80% "\${PAGER:-less} ~/.config/tmux/cheatsheet.md"

# ==================================================================================================
# pane-mode (zellij: SwitchToMode "pane")
# ==================================================================================================
bind -T pane-mode h select-pane -L \; switch-client -T pane-mode
bind -T pane-mode j select-pane -D \; switch-client -T pane-mode
bind -T pane-mode k select-pane -U \; switch-client -T pane-mode
bind -T pane-mode l select-pane -R \; switch-client -T pane-mode
bind -T pane-mode Left  select-pane -L \; switch-client -T pane-mode
bind -T pane-mode Down  select-pane -D \; switch-client -T pane-mode
bind -T pane-mode Up    select-pane -U \; switch-client -T pane-mode
bind -T pane-mode Right select-pane -R \; switch-client -T pane-mode
bind -T pane-mode Tab   select-pane -t :.+ \; switch-client -T pane-mode

bind -T pane-mode c command-prompt -p "Pane title:" "select-pane -T '%%'"
bind -T pane-mode d split-window -v -c "#{pane_current_path}"
bind -T pane-mode f resize-pane -Z
bind -T pane-mode n split-window -h -c "#{pane_current_path}"
bind -T pane-mode r split-window -h -c "#{pane_current_path}"
bind -T pane-mode w display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind -T pane-mode x kill-pane
bind -T pane-mode z set -w pane-border-status

bind -T pane-mode Enter  switch-client -T root
bind -T pane-mode Escape switch-client -T root
bind -T pane-mode q      switch-client -T root

# ==================================================================================================
# tab-mode (zellij tabs == tmux windows)
# ==================================================================================================
bind -T tab-mode h previous-window \; switch-client -T tab-mode
bind -T tab-mode j next-window     \; switch-client -T tab-mode
bind -T tab-mode k previous-window \; switch-client -T tab-mode
bind -T tab-mode l next-window     \; switch-client -T tab-mode
bind -T tab-mode Left  previous-window \; switch-client -T tab-mode
bind -T tab-mode Right next-window     \; switch-client -T tab-mode
bind -T tab-mode Up    previous-window \; switch-client -T tab-mode
bind -T tab-mode Down  next-window     \; switch-client -T tab-mode
bind -T tab-mode Tab   last-window     \; switch-client -T tab-mode

bind -T tab-mode 1 select-window -t 1
bind -T tab-mode 2 select-window -t 2
bind -T tab-mode 3 select-window -t 3
bind -T tab-mode 4 select-window -t 4
bind -T tab-mode 5 select-window -t 5
bind -T tab-mode 6 select-window -t 6
bind -T tab-mode 7 select-window -t 7
bind -T tab-mode 8 select-window -t 8
bind -T tab-mode 9 select-window -t 9

bind -T tab-mode n new-window -c "#{pane_current_path}"
bind -T tab-mode r command-prompt -p "Window name:" "rename-window '%%'"
bind -T tab-mode b break-pane
bind -T tab-mode '[' swap-window -t -1 \; select-window -t -1
bind -T tab-mode ']' swap-window -t +1 \; select-window -t +1
bind -T tab-mode s set -w synchronize-panes
bind -T tab-mode x kill-window

bind -T tab-mode Enter  switch-client -T root
bind -T tab-mode Escape switch-client -T root
bind -T tab-mode q      switch-client -T root

# ==================================================================================================
# resize-mode
# ==================================================================================================
bind -T resize-mode h resize-pane -L 2 \; switch-client -T resize-mode
bind -T resize-mode j resize-pane -D 1 \; switch-client -T resize-mode
bind -T resize-mode k resize-pane -U 1 \; switch-client -T resize-mode
bind -T resize-mode l resize-pane -R 2 \; switch-client -T resize-mode
bind -T resize-mode Left  resize-pane -L 2 \; switch-client -T resize-mode
bind -T resize-mode Down  resize-pane -D 1 \; switch-client -T resize-mode
bind -T resize-mode Up    resize-pane -U 1 \; switch-client -T resize-mode
bind -T resize-mode Right resize-pane -R 2 \; switch-client -T resize-mode
bind -T resize-mode H resize-pane -L 5 \; switch-client -T resize-mode
bind -T resize-mode J resize-pane -D 3 \; switch-client -T resize-mode
bind -T resize-mode K resize-pane -U 3 \; switch-client -T resize-mode
bind -T resize-mode L resize-pane -R 5 \; switch-client -T resize-mode
bind -T resize-mode + resize-pane -Z \; switch-client -T resize-mode
bind -T resize-mode = resize-pane -Z \; switch-client -T resize-mode

bind -T resize-mode Enter  switch-client -T root
bind -T resize-mode Escape switch-client -T root
bind -T resize-mode q      switch-client -T root

# ==================================================================================================
# scroll-mode (enters tmux copy-mode — tmux's native scrollback)
# ==================================================================================================
bind -T scroll-mode Enter  copy-mode
bind -T scroll-mode Escape copy-mode
bind -T scroll-mode k      copy-mode -u
bind -T scroll-mode j      copy-mode \; send-keys -X scroll-down
bind -T scroll-mode u      copy-mode -u \; send-keys -X halfpage-up
bind -T scroll-mode d      copy-mode \; send-keys -X halfpage-down
bind -T scroll-mode f      copy-mode \; command-prompt -p "/" "send-keys -X search-backward '%%'"

# ==================================================================================================
# session-mode (zellij's session menu — pared down to tmux equivalents)
# ==================================================================================================
bind -T session-mode d detach-client
bind -T session-mode w choose-tree -Zs
bind -T session-mode s choose-tree -Zs
bind -T session-mode Enter  switch-client -T root
bind -T session-mode Escape switch-client -T root
bind -T session-mode q      switch-client -T root

# ==================================================================================================
# move-mode (physically swap panes)
# ==================================================================================================
bind -T move-mode h swap-pane -s '{left-of}'  \; switch-client -T move-mode
bind -T move-mode j swap-pane -s '{down-of}'  \; switch-client -T move-mode
bind -T move-mode k swap-pane -s '{up-of}'    \; switch-client -T move-mode
bind -T move-mode l swap-pane -s '{right-of}' \; switch-client -T move-mode
bind -T move-mode n swap-pane -D \; switch-client -T move-mode
bind -T move-mode p swap-pane -U \; switch-client -T move-mode
bind -T move-mode Tab swap-pane -D \; switch-client -T move-mode

bind -T move-mode Enter  switch-client -T root
bind -T move-mode Escape switch-client -T root
bind -T move-mode q      switch-client -T root

# ==================================================================================================
# Copy-mode: vi-style + kitty clipboard
# ==================================================================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ==================================================================================================
# Theme
# ==================================================================================================
source-file ~/.config/tmux/tokyonight_night.tmux

# Override theme's pane border colours. No bold — bold + box-drawing chars
# makes the active line visually bleed across cell boundaries.
# (Must come AFTER the theme source.)
set -g pane-active-border-style "fg=#ff9e64"
set -g pane-border-style        "fg=#292e42"

# ==================================================================================================
# Plugins (TPM)
# ==================================================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Keep this line at the very bottom
run '~/.tmux/plugins/tpm/tpm'
